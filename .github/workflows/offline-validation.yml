name: offline-validation

on:
  push:
  pull_request:

jobs:
  offline-validation:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python requirements
        run: python -m pip install -r requirements.txt

      - name: Install editable CLI
        run: python -m pip install -e .

      - name: Run local transcript demo
        run: kw demo

      - name: Run offline regression suite
        run: python tests/knowledge_workflow_regression.py

      - name: Run real workflow acceptance
        run: python tests/real_workflow_acceptance.py

      - name: Validate canonical source-status contract
        run: python tests/test_source_status_contract.py

      - name: Run offline media ASR end-to-end regression
        run: python tests/test_media_asr_end_to_end.py
