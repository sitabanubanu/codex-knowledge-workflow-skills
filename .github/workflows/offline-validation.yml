name: offline-validation

on:
  push:
  pull_request:

jobs:
  offline-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python requirements
        run: python -m pip install -r requirements.txt

      - name: Install editable CLI
        run: python -m pip install -e .

      - name: Run local transcript demo
        run: kw demo

      - name: Run offline regression suite
        run: python tests/knowledge_workflow_regression.py

      - name: Run real workflow acceptance
        run: python tests/real_workflow_acceptance.py
