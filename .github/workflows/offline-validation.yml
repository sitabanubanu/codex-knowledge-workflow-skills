name: offline-validation

on:
  push:
  pull_request:

jobs:
  offline-validation:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python requirements
        run: python -m pip install -r requirements.txt

      - name: Install editable CLI
        run: python -m pip install -e .

      - name: Run complete offline product validation
        run: kw validate --output-root test_outputs/validation/ci

      - name: Lint evaluation v2 inputs for gold leakage
        run: python eval/v2/leakage_lint.py

      - name: Validate evaluation v2 JSON Schema enforcement
        run: python eval/v2/schema_contract_test.py

      - name: Run evaluation v2 offline contract smoke
        run: python eval/v2/run_workflow_contract.py --output-root test_outputs/eval_v2/workflow

      - name: Score evaluation v2 structured decisions
        run: python eval/v2/score_decisions.py --results test_outputs/eval_v2/workflow/results.jsonl --output-root test_outputs/eval_v2/scoring
